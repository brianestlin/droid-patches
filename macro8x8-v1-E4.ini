# 8x8 macro controller (E4 version)

# This macro controller outputs 8 control voltages which can be different in each of 8 "stages".
#
# The behavior varies depending on whether the "go", "adv", and "addr" inputs are patched.
#
# Without any inputs patched, control is fully manual: pressing a button immediately selects the corresponding stage, and the 8 CV outs change (possibly slewed) to the values at the chosen stage.
#
# Turn the encoders to set the values of the 8 CV outputs for the currently selected stage.  (There is currently no way to edit CV outputs for inactive stages.)
#
# Each encoder can be switched between CV mode and slew mode by pressing the encoder button.
# In CV mode (default), the encoder sets the CV value for that output for the current stage.
# In slew mode, the encoder LED ring glows white and the encoder controls the slew time (0-10s)
# for that output, independently of which stage is active. Press the encoder again to return to
# CV mode.
#
# Patching "go" allows stage-switching to be delayed until the next incoming gate/trigger. In this mode, pressing a button "arms" the corresponding stage. The LED on the armed button flashes until the stage is made active, which occurs on the next gate/trigger on the "go" input.
#
# Patching "adv" allows advancement through stages using gates/triggers instead of pressing buttons. A gate/trig on "adv" either arms or directly advances to the next stage (depending on whether or not "go" is also patched). Patching "addr" together with "adv" allows voltage control over which stage is advanced to (by default, it's the current stage + 1).

# INPUTS:
#  I1: [addr] CV selection of which stage to jump to
#  I4: [go] advance to armed stage
#  I5: [adv] jump to next stage or 'addr'

# OUTPUTS:
#  O1: [CV1]
#  O2: [CV2]
#  O3: [CV3]
#  O4: [CV4]
#  O5: [CV5]
#  O6: [CV6]
#  O7: [CV7]
#  O8: [CV8]

# CONTROLLER 1 (P2B8):
#  P1.1: [unused]
#  P1.2: [unused]
#  B1.1: [stage 1]
#  B1.2: [stage 2]
#  B1.3: [stage 3]
#  B1.4: [stage 4]
#  B1.5: [stage 5]
#  B1.6: [stage 6]
#  B1.7: [stage 7]
#  B1.8: [stage 8]

# CONTROLLER 2 (E4, first):
#  Encoder 1: [CV1] edit CV1 for current stage (CV mode) / slew time for CV1 (slew mode)
#  Encoder 2: [CV2] edit CV2 for current stage (CV mode) / slew time for CV2 (slew mode)
#  Encoder 3: [CV3] edit CV3 for current stage (CV mode) / slew time for CV3 (slew mode)
#  Encoder 4: [CV4] edit CV4 for current stage (CV mode) / slew time for CV4 (slew mode)
#  Push encoder 1-4: toggle between CV mode and slew mode (white LED ring = slew mode)

# CONTROLLER 3 (E4, second):
#  Encoder 5: [CV5] edit CV5 for current stage (CV mode) / slew time for CV5 (slew mode)
#  Encoder 6: [CV6] edit CV6 for current stage (CV mode) / slew time for CV6 (slew mode)
#  Encoder 7: [CV7] edit CV7 for current stage (CV mode) / slew time for CV7 (slew mode)
#  Encoder 8: [CV8] edit CV8 for current stage (CV mode) / slew time for CV8 (slew mode)
#  Push encoder 5-8: toggle between CV mode and slew mode (white LED ring = slew mode)

[p2b8]
[e4]
[e4]

# -------------------------------------------------
# Inputs
# -------------------------------------------------

# Indicate whether "next" is unpatched so we know whether any buttonpress should immediately advance.
[copy]
    input = -2
    output = N4

# Global variable for value of "next" input.
[copy]
    input = I4
    output = _GO_IN

[gatetool]
    inputgate = I4
    outputtrigger = _GO_TRIG_IN

# 1 if "next" input is patched, 0 otherwise.
[compare]
    input = _GO_IN
    compare = -2
    ifequal = 0
    else = 1
    output = _GO_IS_PATCHED

# Normalize an invalid CV value to "addr" so that we can detect whether this input is patched.
[copy]
    input = -2
    output = N1

# Global variable for value of "addr" input.
[copy]
    input = I1
    output = _ADDR_CV

# 1 if "addr" input is patched, 0 otherwise.
[compare]
    input = _ADDR_CV
    compare = -2
    ifequal = 0
    else = 1
    output = _ADDR_IS_PATCHED

# Normalize an invalid CV value to "reset" so that we can detect whether this input is patched.
[copy]
    input = -2
    output = N5

# Global variable for value of "reset" input.
[copy]
    input = I5
    output = _ADV_IN

# Turn reset gate into a trigger. (TODO: is this necessary?)
[gatetool]
    inputgate = I5
    outputtrigger = _ADV_TRIG

# -------------------------------------------------
# Math for addr
# -------------------------------------------------

# Maps [-10v, 0, +10v] to [16, 0, 16], so that 0-5v can be mapped to [0, 8).
[math]
    input1 = _ADDR_CV * 16
    amount = _STAGE_ADDR_FLOAT

# Converts stage addr to an integer.
[math]
    input1 = _STAGE_ADDR_FLOAT
    floor = _STAGE_ADDR_INT

# Ensures only valid stage values (0 thru 7)  are addressed.
[math]
    input1 = _STAGE_ADDR_INT
    input2 = 7
    minimum = _ADDRESSED_STAGE

# -------------------------------------------------
# Buttongroup logic
# -------------------------------------------------

# When advancing sequentially, (current+1) mod 8 = next.
[math]
    input1 = _CURRENT_STAGE + 1
    input2 = 8
    modulo = _DEFAULT_ADVSTAGE

# If "addr" CV input is patched, use that for choosing the stage to "adv" to. Otherwise, use the sequentially-next stage.
[case]
    case1 = _ADDR_IS_PATCHED
    value1 = _ADDRESSED_STAGE
    else = _DEFAULT_ADVSTAGE
    output = _STAGE_FOR_ADV

# This buttongroup is used for responding to the buttonpresses that "arm" a button (choose which button will be active on the next "go" gate).
[buttongroup]
    button1 = B1.1
    button2 = B1.2
    button3 = B1.3
    button4 = B1.4
    button5 = B1.5
    button6 = B1.6
    button7 = B1.7
    button8 = B1.8
    clear = _ADV_TRIG
    startbutton = _STAGE_FOR_ADV + 1
    value1 = 1
    value2 = 2
    value3 = 3
    value4 = 4
    value5 = 5
    value6 = 6
    value7 = 7
    value8 = 8
    buttonpress = _BUTTONPRESS
    output = _GOBUTTON

# Send the "go" trigger (to change the active button/stage) when "go" input is triggered if "go" is patched, otherwise when the button is pressed.
[case]
    case1 = _GO_IS_PATCHED
    value1 = _GO_TRIG_IN
    else = _BUTTONPRESS + _ADV_TRIG
    output = _GO_TRIG

# If we get a "adv" trigger at the same time as a "go" trigger, "adv" takes precedence.
[compare]
    input = _ADV_IN
    compare = 0.1
    ifgreater = _STAGE_FOR_ADV + 1
    ifless = _GOBUTTON
    ifequal = _GOBUTTON
    output = _OUTPUT_STARTBUTTON

# The "output" buttongroup, i.e. which button/stage is fully active.
[buttongroup]
    clear = _GO_TRIG
    startbutton = _OUTPUT_STARTBUTTON
    led1 = L1.1
    led2 = L1.2
    led3 = L1.3
    led4 = L1.4
    led5 = L1.5
    led6 = L1.6
    led7 = L1.7
    led8 = L1.8
    output = _CURRENT_STAGE

# Provides an LFO for flashing buttons. Used below to indicate which button is "armed" (active next).
[lfo]
    level = 0.3
    hz = 2
    triangle = _FLASHLFO

# Don't flash the currently-active button, even if it's also the armed button.
[compare]
    input = _GOBUTTON
    compare = _CURRENT_STAGE + 1
    ifequal = 1
    else = _FLASHLFO
    output = _FLASH

# Flash button 1 if it's armed.
[select]
    input = _FLASH
    select = _GOBUTTON
    selectat = 1
    output = L1.1

# Flash button 2 if it's armed.
[select]
    input = _FLASH
    select = _GOBUTTON
    selectat = 2
    output = L1.2

# Flash button 3 if it's armed.
[select]
    input = _FLASH
    select = _GOBUTTON
    selectat = 3
    output = L1.3

# Flash button 4 if it's armed.
[select]
    input = _FLASH
    select = _GOBUTTON
    selectat = 4
    output = L1.4

# Flash button 5 if it's armed.
[select]
    input = _FLASH
    select = _GOBUTTON
    selectat = 5
    output = L1.5

# Flash button 6 if it's armed.
[select]
    input = _FLASH
    select = _GOBUTTON
    selectat = 6
    output = L1.6

# Flash button 7 if it's armed.
[select]
    input = _FLASH
    select = _GOBUTTON
    selectat = 7
    output = L1.7

# Flash button 8 if it's armed.
[select]
    input = _FLASH
    select = _GOBUTTON
    selectat = 8
    output = L1.8

# -------------------------------------------------
# Encoder mode toggles
# -------------------------------------------------

# Each encoder button toggles that encoder between CV mode (0) and slew mode (1).
[flipflop]
    toggle = B2.1
    output = _ENC1_SLEW_MODE

[flipflop]
    toggle = B2.2
    output = _ENC2_SLEW_MODE

[flipflop]
    toggle = B2.3
    output = _ENC3_SLEW_MODE

[flipflop]
    toggle = B2.4
    output = _ENC4_SLEW_MODE

[flipflop]
    toggle = B3.1
    output = _ENC5_SLEW_MODE

[flipflop]
    toggle = B3.2
    output = _ENC6_SLEW_MODE

[flipflop]
    toggle = B3.3
    output = _ENC7_SLEW_MODE

[flipflop]
    toggle = B3.4
    output = _ENC8_SLEW_MODE

# White LED ring overlay (via L register) when encoder is in slew mode.
# Low brightness (0.15) gives a dim white background; the encoder's own indicator dot
# appears brighter against it, giving "dim white background / bright point indicator."
[math]
    input1 = _ENC1_SLEW_MODE * 0.15
    amount = L2.1

[math]
    input1 = _ENC2_SLEW_MODE * 0.15
    amount = L2.2

[math]
    input1 = _ENC3_SLEW_MODE * 0.15
    amount = L2.3

[math]
    input1 = _ENC4_SLEW_MODE * 0.15
    amount = L2.4

[math]
    input1 = _ENC5_SLEW_MODE * 0.15
    amount = L3.1

[math]
    input1 = _ENC6_SLEW_MODE * 0.15
    amount = L3.2

[math]
    input1 = _ENC7_SLEW_MODE * 0.15
    amount = L3.3

[math]
    input1 = _ENC8_SLEW_MODE * 0.15
    amount = L3.4


# Active CV stage for each encoder: equals _CURRENT_STAGE when in CV mode, -1 when in slew mode.
# CV encoder circuits use selectat=0..7 to match the stage; -1 deactivates all of them in slew mode.
[case]
    case1 = _ENC1_SLEW_MODE
    value1 = -1
    else = _CURRENT_STAGE
    output = _ENC1_ACTIVE_CV_STAGE

[case]
    case1 = _ENC2_SLEW_MODE
    value1 = -1
    else = _CURRENT_STAGE
    output = _ENC2_ACTIVE_CV_STAGE

[case]
    case1 = _ENC3_SLEW_MODE
    value1 = -1
    else = _CURRENT_STAGE
    output = _ENC3_ACTIVE_CV_STAGE

[case]
    case1 = _ENC4_SLEW_MODE
    value1 = -1
    else = _CURRENT_STAGE
    output = _ENC4_ACTIVE_CV_STAGE

[case]
    case1 = _ENC5_SLEW_MODE
    value1 = -1
    else = _CURRENT_STAGE
    output = _ENC5_ACTIVE_CV_STAGE

[case]
    case1 = _ENC6_SLEW_MODE
    value1 = -1
    else = _CURRENT_STAGE
    output = _ENC6_ACTIVE_CV_STAGE

[case]
    case1 = _ENC7_SLEW_MODE
    value1 = -1
    else = _CURRENT_STAGE
    output = _ENC7_ACTIVE_CV_STAGE

[case]
    case1 = _ENC8_SLEW_MODE
    value1 = -1
    else = _CURRENT_STAGE
    output = _ENC8_ACTIVE_CV_STAGE

# -------------------------------------------------
# Stage CV encoders
# -------------------------------------------------

# Each physical encoder has 8 CV encoder circuits (one per stage) and 1 slew encoder circuit.
# The CV circuits use selectat to activate only for the matching stage, and are all deactivated
# when the encoder is in slew mode (via _ENCx_ACTIVE_CV_STAGE = -1).
# The slew circuit activates only when the encoder is in slew mode.

# ----- Encoder 1 (E2.1) — CV1 -----

[encoder]
    encoder = E2.1
    select = _ENC1_ACTIVE_CV_STAGE
    selectat = 0
    output = _CV1_STAGE1

[encoder]
    encoder = E2.1
    select = _ENC1_ACTIVE_CV_STAGE
    selectat = 1
    output = _CV1_STAGE2

[encoder]
    encoder = E2.1
    select = _ENC1_ACTIVE_CV_STAGE
    selectat = 2
    output = _CV1_STAGE3

[encoder]
    encoder = E2.1
    select = _ENC1_ACTIVE_CV_STAGE
    selectat = 3
    output = _CV1_STAGE4

[encoder]

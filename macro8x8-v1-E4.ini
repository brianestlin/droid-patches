    selectat = 5
    output = _CV1_STAGE6

[encoder]
    encoder = E2.1
    select = _ENC1_ACTIVE_CV_STAGE
    selectat = 6
    output = _CV1_STAGE7

[encoder]
    encoder = E2.1
    select = _ENC1_ACTIVE_CV_STAGE
    selectat = 7
    output = _CV1_STAGE8

[encoder]
    encoder = E2.1
    select = _ENC1_SLEW_MODE

    ledfill = 0
    output = _SLEW1

